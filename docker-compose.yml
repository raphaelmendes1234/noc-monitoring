services:
  # ---------- Banco de dados do Zabbix ----------
  zabbix-postgres:
    image: postgres:16-alpine
    container_name: zabbix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - zabbix-pgdata:/var/lib/postgresql/data
    networks:
      - noc-net

  # ---------- Zabbix Server (coleta e processa) ----------
  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-7.0-latest
    container_name: zabbix-server
    restart: unless-stopped
    environment:
      DB_SERVER_HOST: zabbix-postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "10051:10051"   # porta dos agentes Zabbix
    depends_on:
      - zabbix-postgres
    networks:
      - noc-net

  # ---------- Zabbix Web (interface) ----------
  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-7.0-latest
    container_name: zabbix-web
    restart: unless-stopped
    environment:
      ZBX_SERVER_HOST: zabbix-server
      DB_SERVER_HOST: zabbix-postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PHP_TZ: ${TZ}
    ports:
      - "8080:8080"     # interface web do Zabbix -> http://localhost:8080
    depends_on:
      - zabbix-server
    networks:
      - noc-net

  # ---------- Prometheus (métricas) ----------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"     # interface do Prometheus -> http://localhost:9090
    networks:
      - noc-net

  # ---------- node-exporter (métricas de sistema) ----------
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - noc-net

  # ---------- Grafana (dashboards) ----------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"     # interface do Grafana -> http://localhost:3000
    depends_on:
      - prometheus
    networks:
      - noc-net

networks:
  noc-net:
    driver: bridge

volumes:
  zabbix-pgdata:
  prometheus-data:
  grafana-data:
