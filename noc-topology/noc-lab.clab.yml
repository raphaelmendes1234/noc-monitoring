name: noc-lab

topology:
  nodes:
    # ---------- Roteadores (FRRouting) ----------
    router1:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - router1/daemons:/etc/frr/daemons
      exec:
        - ip addr add 192.168.10.1/24 dev eth1
        - ip addr add 10.0.0.1/30 dev eth2

    router2:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - router2/daemons:/etc/frr/daemons
      exec:
        - ip addr add 192.168.20.1/24 dev eth1
        - ip addr add 10.0.0.2/30 dev eth2

    # ---------- Hosts Linux (simulam servidores) ----------
    host1:
      kind: linux
      image: alpine:latest
      exec:
        - ip addr add 192.168.10.10/24 dev eth1
        - ip route add 192.168.20.0/24 via 192.168.10.1
        - ip route del default 2>/dev/null || true

    host2:
      kind: linux
      image: alpine:latest
      exec:
        - ip addr add 192.168.20.10/24 dev eth1
        - ip route add 192.168.10.0/24 via 192.168.20.1
        - ip route del default 2>/dev/null || true

  links:
    # host1 <-> router1 (rede de servidores 1)
    - endpoints: ["host1:eth1", "router1:eth1"]
    # router1 <-> router2 (link de trânsito, OSPF roda aqui)
    - endpoints: ["router1:eth2", "router2:eth2"]
    # router2 <-> host2 (rede de servidores 2)
    - endpoints: ["host2:eth1", "router2:eth1"]
