<svg viewBox="0 0 840 480" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 21px; font-weight: 700; fill: #1a2332; }
      .subtitle { font-size: 12px; fill: #5b6b82; }
      .label { font-size: 13px; font-weight: 700; fill: #1a2332; }
      .ip { font-size: 11px; fill: #5b6b82; }
      .ztext { font-size: 11px; font-weight: 700; fill: #6b7689; letter-spacing: 1px; }
      .link { stroke: #8a96a8; stroke-width: 2.5; }
      .ospflink { stroke: #2e9e8f; stroke-width: 3; }
      .ospfbadge { font-size: 11px; font-weight: 700; fill: #2e9e8f; }
    </style>
  </defs>

  <text x="40" y="42" class="title">Topologia de Rede — Roteamento OSPF (Containerlab)</text>
  <text x="40" y="62" class="subtitle">Duas sub-redes conectadas por roteamento dinâmico OSPF · FRRouting + hosts Linux</text>

  <!-- ===== Sub-rede de servidores 1 ===== -->
  <rect x="40" y="110" width="190" height="150" rx="10" fill="#eef6f4" stroke="#bfe0d9" stroke-width="1.5"/>
  <text x="56" y="132" class="ztext">SUB-REDE 1</text>
  <text x="56" y="148" class="ip">192.168.10.0/24</text>

  <!-- host1 -->
  <rect x="70" y="168" width="130" height="70" rx="8" fill="#ffffff" stroke="#2e9e8f" stroke-width="2"/>
  <rect x="90" y="182" width="40" height="28" rx="3" fill="none" stroke="#2e9e8f" stroke-width="1.5"/>
  <circle cx="110" cy="196" r="3" fill="#2e9e8f"/>
  <text x="138" y="192" class="label">host1</text>
  <text x="138" y="207" class="ip">.10.10</text>
  <text x="78" y="228" class="ip">servidor (Alpine)</text>

  <!-- ===== Router 1 ===== -->
  <rect x="290" y="150" width="110" height="72" rx="8" fill="#ffffff" stroke="#3b5bdb" stroke-width="2"/>
  <circle cx="322" cy="186" r="15" fill="none" stroke="#3b5bdb" stroke-width="2"/>
  <path d="M314,186 h16 M322,178 v16 M316,180 l12,12 M328,180 l-12,12" stroke="#3b5bdb" stroke-width="1.5"/>
  <text x="345" y="182" class="label">router1</text>
  <text x="345" y="197" class="ip">FRR</text>
  <text x="298" y="240" class="ip">.10.1 · 10.0.0.1</text>

  <!-- ===== Router 2 ===== -->
  <rect x="490" y="150" width="110" height="72" rx="8" fill="#ffffff" stroke="#3b5bdb" stroke-width="2"/>
  <circle cx="522" cy="186" r="15" fill="none" stroke="#3b5bdb" stroke-width="2"/>
  <path d="M514,186 h16 M522,178 v16 M516,180 l12,12 M528,180 l-12,12" stroke="#3b5bdb" stroke-width="1.5"/>
  <text x="545" y="182" class="label">router2</text>
  <text x="545" y="197" class="ip">FRR</text>
  <text x="498" y="240" class="ip">.20.1 · 10.0.0.2</text>

  <!-- ===== Sub-rede de servidores 2 ===== -->
  <rect x="660" y="110" width="140" height="150" rx="10" fill="#eef6f4" stroke="#bfe0d9" stroke-width="1.5"/>
  <text x="676" y="132" class="ztext">SUB-REDE 2</text>
  <text x="676" y="148" class="ip">192.168.20.0/24</text>

  <!-- host2 -->
  <rect x="676" y="168" width="110" height="70" rx="8" fill="#ffffff" stroke="#2e9e8f" stroke-width="2"/>
  <rect x="694" y="182" width="36" height="28" rx="3" fill="none" stroke="#2e9e8f" stroke-width="1.5"/>
  <circle cx="712" cy="196" r="3" fill="#2e9e8f"/>
  <text x="738" y="192" class="label">host2</text>
  <text x="738" y="207" class="ip">.20.10</text>
  <text x="684" y="228" class="ip">servidor (Alpine)</text>

  <!-- ===== Links ===== -->
  <!-- host1 - router1 -->
  <line x1="200" y1="190" x2="290" y2="186" class="link"/>
  <!-- router1 = router2 (OSPF) -->
  <line x1="400" y1="186" x2="490" y2="186" class="ospflink"/>
  <!-- router2 - host2 -->
  <line x1="600" y1="186" x2="676" y2="190" class="link"/>

  <!-- OSPF transit badge -->
  <rect x="402" y="100" width="86" height="42" rx="8" fill="#eef6f4" stroke="#2e9e8f" stroke-width="1.5"/>
  <text x="445" y="118" class="ospfbadge" text-anchor="middle">OSPF area 0</text>
  <text x="445" y="133" class="ip" text-anchor="middle">10.0.0.0/30</text>
  <line x1="445" y1="142" x2="445" y2="184" stroke="#2e9e8f" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- ===== Footer: validação ===== -->
  <rect x="40" y="300" width="760" height="150" rx="10" fill="#1a2332"/>
  <text x="60" y="328" font-size="14" font-weight="700" fill="#ffffff">Validação do roteamento dinâmico</text>

  <text x="60" y="356" font-size="12" fill="#7fd9c9" font-weight="700">✓ Conectividade ponta a ponta</text>
  <text x="80" y="374" font-size="11.5" fill="#aeb9cc">host1 → host2 (entre sub-redes): 4 pacotes, 0% de perda · TTL 62 = 2 saltos</text>

  <text x="60" y="400" font-size="12" fill="#7fd9c9" font-weight="700">✓ Rota aprendida via OSPF</text>
  <text x="80" y="418" font-size="11.5" fill="#aeb9cc" font-family="Consolas, monospace">O&gt;* 192.168.20.0/24 [110/20] via 10.0.0.2, eth2</text>

  <text x="60" y="438" font-size="12" fill="#7fd9c9" font-weight="700">✓ Adjacência OSPF estabelecida</text>
  <text x="430" y="438" font-size="11.5" fill="#aeb9cc">router1 ↔ router2 — estado Full</text>
</svg>
