global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus monitora a si mesmo
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # node-exporter (métricas de CPU, memória, disco, rede do host)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # --- Quando o GNS3 entrar (Camada 1), adicione aqui os servidores Linux ---
  # - job_name: "servidores-gns3"
  #   static_configs:
  #     - targets: ["192.168.10.X:9100", "192.168.10.Y:9100"]
